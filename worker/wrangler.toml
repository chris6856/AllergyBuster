name = "allergybuster-tips"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for caching generated tips (one entry per date, TTL 25 hours)
# Create with: wrangler kv namespace create TIPS_CACHE
# Then replace the id below with the output ID.
[[kv_namespaces]]
binding = "TIPS_CACHE"
id = "8aa10f18e2fd4fa7aa25bf69ba08ab38"

# Chain allergen database — create with: wrangler kv namespace create CHAINS_DB
# Then replace the id below with the output ID.
[[kv_namespaces]]
binding = "CHAINS_DB"
id = "REPLACE_WITH_CHAINS_DB_NAMESPACE_ID"

# Secrets — set with:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put ADMIN_KEY   (used to protect PUT/DELETE /chains endpoints)
