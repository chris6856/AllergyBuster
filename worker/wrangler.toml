name = "allergybuster-tips"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for caching generated tips (one entry per date, TTL 25 hours)
# Create with: wrangler kv namespace create TIPS_CACHE
# Then replace the id below with the output ID.
[[kv_namespaces]]
binding = "TIPS_CACHE"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Secrets — set with: wrangler secret put ANTHROPIC_API_KEY
# [vars]
# ANTHROPIC_API_KEY is set as a secret, not a plain var
