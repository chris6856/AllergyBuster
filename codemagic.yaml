workflows:
  react-native-ios:
    name: AllergyBuster iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - app_store
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.allergybusterapp
      vars:
        BUNDLE_ID: "com.allergybusterapp"
      node: 22.11.0

    scripts:
      - name: Install dependencies
        script: |
          cd AllergyBusterApp
          rm -f package-lock.json
          npm install

      - name: Install CocoaPods
        script: |
          cd AllergyBusterApp/ios
          pod install

      - name: Set up keychain
        script: |
          keychain initialize

      - name: Fetch signing files from Apple
        script: |
          app-store-connect fetch-signing-files com.allergybusterapp \
            --type IOS_APP_STORE \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --create

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Build and export IPA
        script: |
          PROFILE=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | head -1)
          UUID=$(security cms -D -i "$PROFILE" | plutil -extract UUID raw -)
          TEAM=$(security cms -D -i "$PROFILE" | plutil -extract TeamIdentifier.0 raw -)

          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$TEAM</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.allergybusterapp</key>
              <string>$UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -workspace AllergyBusterApp/ios/AllergyBusterApp.xcworkspace \
            -scheme AllergyBusterApp \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/AllergyBusterApp.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="$UUID" \
            DEVELOPMENT_TEAM="$TEAM" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            | xcpretty

          xcodebuild \
            -exportArchive \
            -archivePath $CM_BUILD_DIR/AllergyBusterApp.xcarchive \
            -exportPath $CM_BUILD_DIR/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Clean up keychain
        script: |
          keychain cleanup

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
