workflows:
  react-native-ios:
    name: AllergyBuster iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.allergybusterapp
      vars:
        XCODE_PROJECT: "AllergyBusterApp/ios/AllergyBusterApp.xcworkspace"
        BUNDLE_ID: "com.allergybusterapp"
      node: 18.20.4

    scripts:
      - name: Install dependencies
        script: |
          cd AllergyBusterApp
          npm install

      - name: Install CocoaPods
        script: |
          cd AllergyBusterApp/ios
          pod install

      - name: Build iOS release
        script: |
          cd AllergyBusterApp
          xcode-project use-profiles
          xcodebuild \
            -workspace ios/AllergyBusterApp.xcworkspace \
            -scheme AllergyBusterApp \
            -configuration Release \
            -archivePath build/AllergyBusterApp.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=$(echo $CM_CERTIFICATE | openssl x509 -noout -subject 2>/dev/null | grep -o 'OU=[^/]*' | cut -d= -f2 || echo "") \
            | xcpretty

      - name: Export IPA
        script: |
          cd AllergyBusterApp
          xcode-project build-ipa \
            --workspace ios/AllergyBusterApp.xcworkspace \
            --config Release

    artifacts:
      - AllergyBusterApp/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
