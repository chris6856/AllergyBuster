workflows:
  react-native-ios:
    name: AllergyBuster iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - app_store
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.allergybusterapp
      vars:
        BUNDLE_ID: "com.allergybusterapp"
      node: 22.11.0

    scripts:
      - name: Install dependencies
        script: |
          cd AllergyBusterApp
          rm -f package-lock.json
          npm install

      - name: Install CocoaPods
        script: |
          cd AllergyBusterApp/ios
          pod install

      - name: Set up keychain
        script: |
          keychain initialize

      - name: Fetch signing files from Apple
        script: |
          app-store-connect fetch-signing-files com.allergybusterapp \
            --type IOS_APP_STORE \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --create

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build and export IPA
        script: |
          xcode-project build-ipa \
            --workspace AllergyBusterApp/ios/AllergyBusterApp.xcworkspace \
            --config Release

      - name: Clean up keychain
        script: |
          keychain cleanup

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
